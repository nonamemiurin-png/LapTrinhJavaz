<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý AI Sinh Viên</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">🎓</div>
                <h2>UniBot</h2>
            </div>
            
            <div class="upload-section">
                <h3>Tài liệu môn học</h3>
                <div class="upload-box" id="upload-box">
                    <input type="file" id="file-upload" accept=".pdf" hidden />
                    <label for="file-upload" class="upload-label">
                        <span class="upload-icon">📄</span>
                        <span class="upload-text">Tải lên PDF</span>
                    </label>
                </div>
                <div id="upload-status" class="status-message"></div>
            </div>

            <div class="settings-section">
                <h3>Chế độ Model</h3>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="model-mode" value="rag" checked>
                        <span class="radio-custom"></span>
                        RAG (Tài liệu gốc)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="model-mode" value="finetuned">
                        <span class="radio-custom"></span>
                        Fine-Tuned (Mô phỏng)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="model-mode" value="compare">
                        <span class="radio-custom"></span>
                        Chế độ So Sánh
                    </label>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <h1>Trợ lý Học tập Thông minh</h1>
                    <p>Hỏi bất cứ điều gì về tài liệu môn học của bạn</p>
                </div>
            </header>

            <div class="messages-area" id="messages-area">
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        Xin chào! Tôi là trợ lý AI học tập. Hãy tải lên tài liệu môn học ở cột bên trái và bắt đầu đặt câu hỏi nhé!
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Nhập câu hỏi của bạn tại đây..." autocomplete="off">
                    <button type="submit" id="send-btn">Gửi</button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
